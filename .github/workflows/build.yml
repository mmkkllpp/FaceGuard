name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 授权
        run: chmod +x gradlew

      - name: 自动递增版本号
        run: |
          # 从 build.gradle.kts 读取当前 versionCode
          CURRENT=$(grep "versionCode = " app/build.gradle.kts | sed 's/.*= //')
          NEW=$((CURRENT + 1))
          # 更新 versionCode
          sed -i "s/versionCode = $CURRENT/versionCode = $NEW/" app/build.gradle.kts
          # 更新 versionName (取日期作为小版本)
          DATE=$(date +%y%m%d)
          sed -i "s/versionName = \".*\"/versionName = \"1.$DATE.$NEW\"/" app/build.gradle.kts
          echo "版本号: $CURRENT → $NEW (1.$DATE.$NEW)"

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceGuard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
